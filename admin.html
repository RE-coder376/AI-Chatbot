<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Digital FTE</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #64748b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 16px;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      padding: 40px 20px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-end; }
    h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
    .subtitle { color: var(--text-muted); font-size: 14px; }

    /* Login Overlay */
    .auth-section { margin-bottom: 32px; padding: 24px; background: white; border-radius: var(--radius); border: 2px solid var(--primary); box-shadow: var(--shadow); }
    .locked .card-body { pointer-events: none; opacity: 0.4; filter: blur(2px); }
    .locked .card-header { cursor: not-allowed; }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
    }

    .card-header {
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      background: #fff;
    }
    .card-header h2 { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .card-arrow { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; background: #f1f5f9; border-radius: 50%; font-size: 9px; transition: transform 0.3s; }

    .card-body { padding: 0 24px 24px; display: none; }
    .card.open .card-body { display: block; }
    .card.open .card-arrow { transform: rotate(180deg); }

    label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); margin: 16px 0 6px; text-transform: uppercase; }
    
    input, select, textarea {
      width: 100%; padding: 12px 16px; background: #fff; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; transition: all 0.2s;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

    button {
      width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 14px;
    }
    button:hover { background: var(--primary-dark); }
    button.secondary { background: #f1f5f9; color: var(--text-main); border: 1.5px solid var(--border); }
    
    /* Internal Notifications */
    .status-msg { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; display: none; }
    .status-success { background: #dcfce7; color: #166534; display: block; }
    .status-error   { background: #fee2e2; color: #991b1b; display: block; }
    .status-loading { background: #e0f2fe; color: #0c4a6e; display: block; }

    /* Visual Elements */
    .badge { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    .badge-current { background: var(--primary); color: white; }
    #brand-preview { border: 1px solid var(--border); border-radius: 16px; overflow: hidden; max-width: 300px; margin-top: 12px; }
    #prev-header { padding: 12px; display: flex; align-items: center; gap: 10px; }
    
    table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 12px; }
    th { text-align: left; padding: 10px; font-size: 10px; font-weight: 800; color: var(--text-muted); border-bottom: 2px solid var(--border); }
    td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid var(--border); }

    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="locked">
<div class="container">
  <header>
    <div>
      <h1>System Admin</h1>
      <p class="subtitle">Secure control panel for Agni Digital FTE</p>
    </div>
    <div id="global-status" style="font-size:12px; font-weight:700; color:var(--primary);"></div>
  </header>

  <!-- Master Authentication -->
  <div class="auth-section">
    <label style="margin-top:0;">Master Admin Password</label>
    <div style="display:flex; gap:10px;">
      <input type="password" id="master-pass" placeholder="Enter password to unlock system" style="flex:1;"/>
      <button onclick="unlockSystem()" style="width:auto; margin:0; padding:0 30px;">Unlock</button>
    </div>
    <div id="auth-status" class="status-msg"></div>
  </div>

  <!-- 1. Visual Analytics -->
  <div class="card" id="card-stats">
    <div class="card-header" onclick="toggle('stats')">
      <h2>📊 Visual Analytics</h2>
      <div class="card-arrow">▼</div>
    </div>
    <div class="card-body">
      <div class="grid-2">
        <div class="stat-card"><div style="font-size:10px; font-weight:800; color:var(--text-muted);">INTERACTIONS</div><div style="font-size:24px; font-weight:800;" id="stat-total">0</div></div>
        <div class="stat-card"><div style="font-size:10px; font-weight:800; color:var(--text-muted);">SUCCESS RATE</div><div style="font-size:24px; font-weight:800; color:var(--primary);" id="stat-rate">0%</div></div>
      </div>
      <canvas id="feedbackChart" height="120" style="margin-top:20px;"></canvas>
      <div id="stats-status" class="status-msg"></div>
    </div>
  </div>

  <!-- 2. Branding -->
  <div class="card" id="card-brand">
    <div class="card-header" onclick="toggle('brand')">
      <h2>🎨 Branding & UI</h2>
      <div class="card-arrow">▼</div>
    </div>
    <div class="card-body">
      <div class="grid-2">
        <div><label>Bot Name</label><input type="text" id="b-bot-name"/></div>
        <div><label>Business Name</label><input type="text" id="b-biz-name"/></div>
      </div>
      <label>Welcome Message</label>
      <input type="text" id="b-welcome"/>
      <div class="grid-4">
        <div><label>Primary</label><input type="color" id="b-primary-hex"/></div>
        <div><label>Secondary</label><input type="color" id="b-secondary-hex"/></div>
        <div><label>Bot Bubble</label><input type="color" id="b-bot-bubble-hex"/></div>
        <div><label>User Bubble</label><input type="color" id="b-user-bubble-hex"/></div>
      </div>
      <div id="brand-preview">
        <div id="prev-header" style="background:var(--primary); color:white;"><span id="prev-emoji">🤖</span> <span id="prev-title" style="font-weight:700; font-size:13px;">Support</span></div>
        <div style="padding:12px; background:#f8fafc;"><div id="prev-bubble" style="background:#f1f5f9; font-size:11px; padding:8px; border-radius:10px;">Hi!</div></div>
      </div>
      <button onclick="saveBranding()" id="btn-save-brand">Update Branding</button>
      <div id="brand-status" class="status-msg"></div>
    </div>
  </div>

  <!-- 3. Database Manager -->
  <div class="card" id="card-db">
    <div class="card-header" onclick="toggle('db')">
      <h2>🗄️ Database Manager</h2>
      <div class="card-arrow">▼</div>
    </div>
    <div class="card-body">
      <label>Create New Knowledge Base</label>
      <div style="display:flex; gap:10px;">
        <input type="text" id="new-db-name" placeholder="e.g. documentation"/>
        <button onclick="createDb()" style="width:auto; margin:0; background:#10b981;">Create</button>
      </div>
      <label style="margin-top:20px;">Active Databases</label>
      <div id="db-list" style="display:flex; flex-direction:column; gap:8px;"></div>
      <div id="db-status" class="status-msg"></div>
    </div>
  </div>

  <!-- 4. Key Vault -->
  <div class="card" id="card-keys">
    <div class="card-header" onclick="toggle('keys')">
      <h2>🔑 API Key Vault</h2>
      <div class="card-arrow">▼</div>
    </div>
    <div class="card-body">
      <table id="key-table">
        <thead><tr><th>Label</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="key-vault-body"></tbody>
      </table>
      <div style="margin-top:20px; padding:16px; background:#f8fafc; border-radius:12px;">
        <div class="grid-2">
          <input type="text" id="new-key-label" placeholder="Key Label"/>
          <input type="password" id="new-key-val" placeholder="gsk_..."/>
        </div>
        <button onclick="addKey()" style="background:#0ea5e9;">+ Add Key</button>
      </div>
      <div id="keys-status" class="status-msg"></div>
    </div>
  </div>

  <!-- 5. Ingestion -->
  <div class="card" id="card-ingest">
    <div class="card-header" onclick="toggle('ingest')">
      <h2>🧠 Knowledge Ingestion</h2>
      <div class="card-arrow">▼</div>
    </div>
    <div class="card-body">
      <textarea id="content" placeholder="Paste data here..." style="height:150px;"></textarea>
      <button onclick="updateText()">Ingest Text</button>
      <div id="ingest-status" class="status-msg"></div>
    </div>
  </div>

  <button class="secondary" onclick="clearLocalCache()" style="margin-top:20px; color:#ef4444;">Reset Form Draft</button>
</div>

<script>
  const API = (window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')) ? 'http://127.0.0.1:8000' : window.location.origin;
  let feedbackChart = null;

  function showStatus(id, msg, type) {
    const el = document.getElementById(id + '-status');
    if (!el) return;
    el.textContent = msg;
    el.className = 'status-msg status-' + type;
    if (type !== 'loading') setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  function unlockSystem() {
    const pass = document.getElementById('master-pass').value;
    if (!pass) { showStatus('auth', 'Please enter a password.', 'error'); return; }
    
    showStatus('auth', 'Verifying...', 'loading');
    // We verify by trying to load branding
    fetch(`${API}/admin/branding?password=${encodeURIComponent(pass)}`)
      .then(r => r.json())
      .then(data => {
        if (data.error) { showStatus('auth', 'Invalid password.', 'error'); }
        else {
          document.body.classList.remove('locked');
          showStatus('auth', 'System Unlocked', 'success');
          loadAllData(data);
        }
      }).catch(() => showStatus('auth', 'Connection failed.', 'error'));
  }

  function toggle(id) {
    if (document.body.classList.contains('locked')) return;
    const card = document.getElementById('card-' + id);
    card.classList.toggle('open');
    if (card.classList.contains('open')) {
      if (id === 'keys') loadKeyVault();
      if (id === 'db') loadDatabases();
      if (id === 'stats') loadAnalytics();
    }
  }

  function loadAllData(brandingData) {
    const b = brandingData.branding || {};
    document.getElementById("b-bot-name").value = brandingData.bot_name || "";
    document.getElementById("b-biz-name").value = brandingData.business_name || "";
    document.getElementById("b-welcome").value = b.welcome_message || "";
    document.getElementById("b-primary-hex").value = b.primary_color || "#6366f1";
    document.getElementById("b-bot-bubble-hex").value = b.bot_bubble_color || "#f1f5f9";
    updatePreview();
  }

  async function saveBranding() {
    const pass = document.getElementById('master-pass').value;
    const payload = {
      password: pass,
      bot_name: document.getElementById("b-bot-name").value,
      business_name: document.getElementById("b-biz-name").value,
      branding: {
        welcome_message: document.getElementById("b-welcome").value,
        primary_color: document.getElementById("b-primary-hex").value,
        bot_bubble_color: document.getElementById("b-bot-bubble-hex").value
      }
    };
    showStatus('brand', 'Saving...', 'loading');
    const res = await fetch(`${API}/admin/branding`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
    const data = await res.json();
    showStatus('brand', data.message || data.error, data.success ? 'success' : 'error');
  }

  async function loadDatabases() {
    const pass = document.getElementById('master-pass').value;
    showStatus('db', 'Loading...', 'loading');
    const res = await fetch(`${API}/admin/databases?password=${encodeURIComponent(pass)}`);
    const data = await res.json();
    document.getElementById("db-list").innerHTML = (data.databases || []).map(db => `
      <div style="padding:14px; border:1.5px solid ${db.active?'var(--primary)':'var(--border)'}; border-radius:10px; display:flex; justify-content:space-between; align-items:center; background:white;">
        <div><div style="font-weight:700; font-size:13px;">${db.name}</div></div>
        ${!db.active ? `<button class="secondary" onclick="setActiveDb('${db.name}')" style="width:auto; margin:0; padding:6px 12px; font-size:11px;">Activate</button>` : '<span class="badge badge-current">Active</span>'}
      </div>
    `).join("");
    showStatus('db', 'Updated', 'success');
  }

  async function setActiveDb(name) {
    const pass = document.getElementById('master-pass').value;
    const f = new FormData(); f.append("password", pass); f.append("name", name);
    await fetch(`${API}/admin/databases/set-active`, { method:"POST", body:f });
    loadDatabases();
  }

  async function updateText() {
    const pass = document.getElementById('master-pass').value;
    const f = new FormData(); f.append("password", pass); f.append("content", document.getElementById("content").value); f.append("filename", "manual.txt");
    showStatus('ingest', 'Ingesting...', 'loading');
    const res = await fetch(`${API}/admin/update-text`, { method:"POST", body:f });
    const d = await res.json();
    showStatus('ingest', d.message || d.error, d.success ? 'success' : 'error');
  }

  function updatePreview() {
    const primary = document.getElementById("b-primary-hex").value;
    document.getElementById("prev-header").style.background = primary;
    document.getElementById("prev-bubble").style.background = document.getElementById("b-bot-bubble-hex").value;
  }

  document.addEventListener("input", (e) => { if (e.target.id && e.target.type !== "password") updatePreview(); });
</script>
</body>
</html>
