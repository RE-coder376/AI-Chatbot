<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatbot Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .card h2 {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f1f5f9;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      user-select:none;
    }
    .card h2:hover { color:#6b21a8; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #475569;
      margin-bottom: 6px;
      margin-top: 14px;
    }
    input[type="password"], input[type="text"], input[type="number"], input[type="email"], textarea, select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { border-color: #6366f1; }
    textarea {
      height: 120px;
      resize: vertical;
      line-height: 1.6;
    }
    button {
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .alert {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .alert.success { background: #dcfce7; color: #166534; display: block; }
    .alert.error   { background: #fee2e2; color: #991b1b; display: block; }
    .alert.info    { background: #e0f2fe; color: #0c4a6e; display: block; }
    .card-arrow { font-size:11px; color:#94a3b8; transition:transform 0.2s; }
    .card-body { display:none; margin-top:16px; }
    .color-picker-wrap { position:relative; display:inline-block; }
    .color-swatch { width:40px;height:40px;border-radius:8px;border:2px solid #e2e8f0;cursor:pointer;display:block; }
    .color-popup { display:none;position:absolute;top:48px;left:0;z-index:999;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.18);padding:14px;width:240px; }
    .color-popup.open { display:block; }
    .spectrum-canvas { width:210px;height:150px;border-radius:6px;cursor:crosshair;display:block; }
    .hue-canvas { width:210px;height:16px;border-radius:4px;cursor:crosshair;display:block;margin-top:8px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Chatbot Admin Panel</h1>
  <p class="subtitle">Configuration persists automatically across refreshes.</p>

  <!-- Branding & Visual Customization -->
  <div class="card">
    <h2 onclick="toggle('s-brand')">Branding &amp; Visual Customization <span class="card-arrow" id="arr-brand">▼</span></h2>
    <div class="card-body" id="s-brand" style="display:block;">
    <label>Admin Password (Not cached for security)</label>
    <input type="password" id="brand-pass" placeholder="Enter admin password"/>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
      <div>
        <label>Bot Name</label>
        <input type="text" id="b-bot-name" placeholder="e.g. Agni"/>
      </div>
      <div>
        <label>Business Name</label>
        <input type="text" id="b-biz-name" placeholder="e.g. AgentFactory"/>
      </div>
      <div>
        <label>Header Title</label>
        <input type="text" id="b-header-title" placeholder="e.g. AgentFactory Support"/>
      </div>
      <div>
        <label>Header Subtitle</label>
        <input type="text" id="b-header-subtitle" placeholder="e.g. Online — here to help"/>
      </div>
      <div>
        <label>Logo Emoji</label>
        <input type="text" id="b-logo-emoji" placeholder="e.g. 🤖" maxlength="4"/>
      </div>
      <div>
        <label>Logo URL (optional)</label>
        <input type="text" id="b-logo-url" placeholder="https://..."/>
      </div>
    </div>

    <div style="margin-top:12px;">
      <label>Welcome Message</label>
      <input type="text" id="b-welcome" placeholder="Hi! I'm Agni, your AI specialist..."/>
    </div>
    <div style="margin-top:12px;">
      <label>Input Placeholder</label>
      <input type="text" id="b-placeholder" placeholder="Ask about our Digital FTEs..."/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
      <div>
        <label>Page Title</label>
        <input type="text" id="b-page-title" placeholder="AgentFactory — Chat Support"/>
      </div>
      <div>
        <label>Font Style</label>
        <select id="b-font-style" onchange="updatePreview()">
          <option value="Modern Sans">Modern Sans</option>
          <option value="Elegant Serif">Elegant Serif</option>
          <option value="Tech Mono">Tech Mono</option>
          <option value="Friendly Rounded">Friendly Rounded</option>
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;">
      <div>
        <label>Primary Color</label>
        <input type="text" id="b-primary-hex" placeholder="#6366f1" oninput="hexTyped('primary',this.value)"/>
      </div>
      <div>
        <label>Secondary Color</label>
        <input type="text" id="b-secondary-hex" placeholder="#4f46e5" oninput="hexTyped('secondary',this.value)"/>
      </div>
      <div>
        <label>Bot Bubble Color</label>
        <input type="text" id="b-bot-bubble-hex" placeholder="#f1f5f9" oninput="hexTyped('bot-bubble',this.value)"/>
      </div>
      <div>
        <label>User Bubble Color</label>
        <input type="text" id="b-user-bubble-hex" placeholder="#6366f1" oninput="hexTyped('user-bubble',this.value)"/>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:24px;">
      <button onclick="loadBranding()">Load from Server</button>
      <button onclick="saveBranding()" style="background:#16a34a;">Save to Cloud</button>
      <button onclick="clearLocalCache()" style="background:#ef4444; width:auto;">Reset Form</button>
    </div>
    <div class="alert" id="brand-alert"></div>
    </div>
  </div>

  <!-- Contact Settings -->
  <div class="card">
    <h2 onclick="toggle('s-contact')">Contact Settings <span class="card-arrow" id="arr-contact">▼</span></h2>
    <div class="card-body" id="s-contact">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label>WhatsApp number</label>
          <input type="text" id="cs-whatsapp" placeholder="+923001234567"/>
        </div>
        <div>
          <label>Contact email</label>
          <input type="email" id="cs-email" placeholder="support@agentfactory.com"/>
        </div>
      </div>
      <button onclick="saveContactSettings()" style="background:#16a34a;">Save Contact Info</button>
      <div class="alert" id="contact-alert"></div>
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;

  // ── AUTO-SAVE LOGIC (The "No Data Loss" Magic) ────────────────────────
  function saveToLocal() {
    const fields = {};
    document.querySelectorAll("input, select, textarea").forEach(el => {
      if (el.id && el.type !== "password") { 
        fields[el.id] = el.type === "checkbox" ? el.checked : el.value;
      }
    });
    localStorage.setItem("admin_draft", JSON.stringify(fields));
  }

  function loadFromLocal() {
    const data = localStorage.getItem("admin_draft");
    if (!data) return;
    try {
      const fields = JSON.parse(data);
      Object.keys(fields).forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          if (el.type === "checkbox") el.checked = fields[id];
          else el.value = fields[id];
        }
      });
    } catch(e) { console.error("Cache load error", e); }
  }

  function clearLocalCache() {
    if (confirm("Reset all fields? This cannot be undone.")) {
      localStorage.removeItem("admin_draft");
      window.location.reload();
    }
  }

  // Attach auto-save to all inputs
  document.addEventListener("input", (e) => {
    if (e.target.id && e.target.type !== "password") saveToLocal();
  });

  // ── UI HELPERS ─────────────────────────────────────────────────────────
  function toggle(id) {
    const body = document.getElementById(id);
    const arrow = document.getElementById('arr-' + id.replace('s-',''));
    const open = body.style.display === "none" || body.style.display === "";
    body.style.display = open ? "block" : "none";
    if (arrow) arrow.style.transform = open ? "rotate(180deg)" : "rotate(0deg)";
  }

  function showAlert(id, type, msg) {
    const el = document.getElementById(id);
    el.className = `alert ${type}`;
    el.innerHTML = msg;
    setTimeout(() => { el.style.display = 'none'; }, 5000);
  }

  // ── SERVER SYNC ────────────────────────────────────────────────────────
  async function loadBranding() {
    const pass = document.getElementById("brand-pass").value;
    if (!pass) { alert("Enter password to load from server."); return; }
    try {
      const res = await fetch(`${API}/admin/branding?password=${encodeURIComponent(pass)}`);
      const data = await res.json();
      if (data.error) { alert(data.error); return; }
      const b = data.branding || {};
      document.getElementById("b-bot-name").value = data.bot_name || "";
      document.getElementById("b-biz-name").value = data.business_name || "";
      document.getElementById("b-header-title").value = b.header_title || "";
      document.getElementById("b-header-subtitle").value = b.header_subtitle || "";
      document.getElementById("b-logo-emoji").value = b.logo_emoji || "";
      document.getElementById("b-logo-url").value = b.logo_url || "";
      document.getElementById("b-welcome").value = b.welcome_message || "";
      document.getElementById("b-placeholder").value = b.input_placeholder || "";
      document.getElementById("b-page-title").value = b.page_title || "";
      document.getElementById("b-font-style").value = b.font_style || "Modern Sans";
      document.getElementById("b-primary-hex").value = b.primary_color || "";
      document.getElementById("b-secondary-hex").value = b.secondary_color || "";
      document.getElementById("b-bot-bubble-hex").value = b.bot_bubble_color || "";
      document.getElementById("b-user-bubble-hex").value = b.user_bubble_color || "";
      saveToLocal(); // Update cache with server data
      showAlert("brand-alert", "success", "Loaded from server.");
    } catch(e) { alert("Sync failed."); }
  }

  async function saveBranding() {
    const pass = document.getElementById("brand-pass").value;
    if (!pass) { alert("Enter password to save."); return; }
    const payload = {
      password: pass,
      bot_name: document.getElementById("b-bot-name").value,
      business_name: document.getElementById("b-biz-name").value,
      header_title: document.getElementById("b-header-title").value,
      header_subtitle: document.getElementById("b-header-subtitle").value,
      logo_emoji: document.getElementById("b-logo-emoji").value,
      logo_url: document.getElementById("b-logo-url").value,
      welcome_message: document.getElementById("b-welcome").value,
      input_placeholder: document.getElementById("b-placeholder").value,
      page_title: document.getElementById("b-page-title").value,
      font_style: document.getElementById("b-font-style").value,
      primary_color: document.getElementById("b-primary-hex").value,
      secondary_color: document.getElementById("b-secondary-hex").value,
      bot_bubble_color: document.getElementById("b-bot-bubble-hex").value,
      user_bubble_color: document.getElementById("b-user-bubble-hex").value,
    };
    try {
      const res = await fetch(`${API}/admin/branding`, { 
        method: "POST", 
        headers: {"Content-Type": "application/json"}, 
        body: JSON.stringify(payload) 
      });
      const data = await res.json();
      showAlert("brand-alert", data.success ? "success" : "error", data.message || data.error);
    } catch(e) { alert("Save failed."); }
  }

  async function saveContactSettings() {
    const pass = document.getElementById("brand-pass").value; // Reuse password field
    if (!pass) { alert("Enter admin password in the branding section first."); return; }
    const payload = {
      password: pass,
      whatsapp_number: document.getElementById("cs-whatsapp").value,
      contact_email: document.getElementById("cs-email").value
    };
    try {
      const res = await fetch(`${API}/admin/contact-settings`, { 
        method: "POST", 
        headers: {"Content-Type": "application/json"}, 
        body: JSON.stringify(payload) 
      });
      const data = await res.json();
      showAlert("contact-alert", data.success ? "success" : "error", data.message || data.error);
    } catch(e) { alert("Save failed."); }
  }

  // Init
  window.addEventListener("DOMContentLoaded", loadFromLocal);
</script>
</body>
</html>
