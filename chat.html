<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --secondary: #4f46e5;
      --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
      --bubble-user: var(--gradient);
      --bubble-bot: #f1f5f9;
      --font-family: 'Inter', -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: min(450px, 95vw);
      height: min(750px, 92vh);
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .chat-header {
      background: var(--gradient);
      color: white;
      padding: 24px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .avatar {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.25);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }

    .info h3 { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
    .info p { font-size: 13px; opacity: 0.9; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
    .online-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; }

    .new-chat-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: white;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .new-chat-btn:hover { background: rgba(255,255,255,0.25); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #ffffff;
    }

    .message { display: flex; flex-direction: column; gap: 6px; max-width: 85%; }
    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; }

    .bubble {
      padding: 12px 18px;
      border-radius: 20px;
      font-size: 14.5px;
      line-height: 1.6;
      position: relative;
    }

    .message.bot .bubble {
      background: var(--bubble-bot);
      color: #1e293b;
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: var(--bubble-user);
      color: white;
      border-bottom-right-radius: 4px;
    }

    /* Markdown Overrides */
    .bubble h3 { font-size: 16px; margin: 12px 0 8px; color: var(--primary); }
    .bubble ul { margin-left: 20px; margin-bottom: 10px; }
    .bubble code { background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 4px; font-family: monospace; }
    .bubble pre { background: #1e293b; color: #f8fafc; padding: 12px; border-radius: 12px; margin: 10px 0; overflow-x: auto; }

    .lead-card {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      padding: 20px;
      margin: 10px 0;
      animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .lead-card p { font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 14px; }
    .lead-btn-group { display: flex; flex-direction: column; gap: 8px; }
    .lead-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-email { background: #6366f1; color: white; }
    .btn-whatsapp { background: #22c55e; color: white; }
    .btn-cancel { background: #f1f5f9; color: #64748b; }
    .lead-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .input-area {
      padding: 20px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      gap: 12px;
      align-items: center;
      background: white;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      padding: 12px 20px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: var(--primary); }

    .send-btn {
      width: 48px; height: 48px;
      background: var(--gradient);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white;
      transition: all 0.2s;
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .typing { font-size: 12px; color: #94a3b8; font-style: italic; }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar" id="header-avatar">🤖</div>
    <div class="info">
      <h3 id="header-title">AI Support</h3>
      <p><span class="online-dot"></span> <span id="header-subtitle">Ready to assist</span></p>      
    </div>
    <button class="new-chat-btn" onclick="newChat()">New Chat</button>
  </div>
  <div class="messages" id="messages">
    <div class="message bot">
      <div class="bubble" id="welcome-msg">Hi! How can I help you today?</div>
    </div>
  </div>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Message..." autocomplete="off" />
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<script>
  const API_URL = (window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')) ? 'http://127.0.0.1:8000' : window.location.origin;
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");
  
  const history = [];
  let widgetKey = "";
  let contactEmail = "support@agentfactory.com";
  let contactWhatsApp = "";

  // Load config
  fetch(`${API_URL}/config`).then(r => r.json()).then(cfg => {
    widgetKey = cfg.widget_key;
    contactEmail = cfg.contact_email;
    contactWhatsApp = cfg.whatsapp_number;
    
    const b = cfg.branding || {};
    if (b.primary_color) document.documentElement.style.setProperty("--primary", b.primary_color);
    if (b.secondary_color) document.documentElement.style.setProperty("--secondary", b.secondary_color);
    if (b.bot_bubble_color) document.documentElement.style.setProperty("--bubble-bot", b.bot_bubble_color);
    if (b.user_bubble_color) document.documentElement.style.setProperty("--bubble-user", b.user_bubble_color);
    
    document.getElementById("header-title").textContent = b.header_title || "Support";
    document.getElementById("header-subtitle").textContent = b.header_subtitle || "Ready to assist";
    document.getElementById("welcome-msg").textContent = b.welcome_message || `Hi! How can I help you today?`;
    if (b.logo_emoji) document.getElementById("header-avatar").textContent = b.logo_emoji;
  });

  inputEl.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

  async function sendMessage() {
    const q = inputEl.value.trim();
    if (!q) return;
    
    addMessage(q, "user");
    inputEl.value = "";
    sendBtn.disabled = true;

    const botMsgId = "bot-" + Date.now();
    addMessage('<span class="typing">Analyzing...</span>', "bot", botMsgId);
    const bubble = document.getElementById(botMsgId).querySelector(".bubble");

    try {
      const response = await fetch(`${API_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Widget-Key": widgetKey },
        body: JSON.stringify({ question: q, history }),
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullAnswer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split("\n");
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = JSON.parse(line.substring(6));
          if (data.type === "chunk") {
            fullAnswer += data.content;
            bubble.innerHTML = marked.parse(fullAnswer);
          } else if (data.type === "metadata") {
            if (data.capture_lead) showLeadBox();
          }
        }
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      history.push({ role: "user", content: q }, { role: "assistant", content: fullAnswer });
    } catch (e) { bubble.textContent = "Error connecting to server."; }
    sendBtn.disabled = false;
  }

  function addMessage(html, role, id) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    if (id) div.id = id;
    div.innerHTML = `<div class="bubble">${html}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showLeadBox() {
    const cardId = "lead-" + Date.now();
    const div = document.createElement("div");
    div.className = "lead-card";
    div.id = cardId;
    div.innerHTML = `
      <p>Would you like to connect with our team?</p>
      <div class="lead-btn-group">
        <button class="lead-btn btn-email" onclick="contact('email', '${cardId}')">✉️ Send Email</button>
        ${contactWhatsApp ? `<button class="lead-btn btn-whatsapp" onclick="contact('whatsapp', '${cardId}')">💬 Message on WhatsApp</button>` : ''}
        <button class="lead-btn btn-cancel" onclick="document.getElementById('${cardId}').remove()">✕ Changed my mind</button>
      </div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function contact(type, id) {
    if (type === 'email') window.open(`mailto:${contactEmail}`, '_blank');
    else window.open(`https://wa.me/${contactWhatsApp.replace(/\D/g,'')}`, '_blank');
    document.getElementById(id).innerHTML = "<p style='color:#16a34a; text-align:center;'>Opening contact link... Thank you!</p>";
    setTimeout(() => document.getElementById(id).remove(), 3000);
  }

  function newChat() {
    history.length = 0;
    messagesEl.innerHTML = '<div class="message bot"><div class="bubble">Hi! How can I help you today?</div></div>';
  }
</script>
</body>
</html>
