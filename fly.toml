app = "ai-chatbot"
primary_region = "sin"  # Singapore — closest to Pakistan

[build]
  [build.args]
    PYTHON_VERSION = "3.11"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[mounts]]
  source = "chatbot_data"
  destination = "/app/databases"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
