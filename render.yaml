services:
  - type: web
    name: chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_PASSWORD
        sync: false        # Set in Render dashboard — never committed
      - key: SMTP_PASSWORD
        sync: false        # Set in Render dashboard — never committed
