services:
  - type: web
    name: chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: ADMIN_PASSWORD
        sync: false        # Set in Render dashboard — never committed
      - key: SMTP_PASSWORD
        sync: false        # Set in Render dashboard — never committed
      - key: PORT
        value: "8000"
